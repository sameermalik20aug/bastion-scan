server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Single-page app: unknown paths fall back to index.html so client-side
    # routing works on refresh / deep links.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed asset filenames are content-addressed, so cache them hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
